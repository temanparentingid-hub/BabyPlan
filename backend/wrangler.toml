name = "babyplan-backend"
main = "src/index.js"
compatibility_date = "2026-06-18"

# Environmental variables
[vars]
FIREBASE_PROJECT_ID = "steel-market-8jhcx"

# KV Namespace bindings
[[kv_namespaces]]
binding = "BABYPLAN_KV"
id = "YOUR_KV_NAMESPACE_ID_HERE"

# D1 Database bindings
[[d1_databases]]
binding = "DB"
database_name = "babyplan-db"
database_id = "YOUR_D1_DATABASE_ID_HERE"
